# =============================================================================
# Traefik v3 - Configuração de PRODUÇÃO
# =============================================================================
# Pré-requisitos:
#   1. Criar a rede externa:     docker network create proxy-network
#   2. Criar o arquivo de senhas: echo $(htpasswd -nB admin) > ./traefik/auth/dashboard_users
#   3. Criar o arquivo de certs: touch ./traefik/acme/acme.json && chmod 600 ./traefik/acme/acme.json
#   4. Definir as variáveis de ambiente no arquivo .env (veja .env.example abaixo)
#
# Estrutura de arquivos esperada:                                                                                                                              #   ./traefik/
#   ├── acme/
#   │   └── acme.json          ← gerado automaticamente pelo Let's Encrypt
#   ├── auth/
#   │   └── dashboard_users    ← usuário:senha (htpasswd -nB admin)
#   └── config/
#       └── traefik.yml        ← config estática opcional (não obrigatório)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Proxy do socket do Docker — o Traefik nunca toca /var/run/docker.sock
  # diretamente. Este proxy libera apenas os endpoints read-only necessários
  # ao provider docker (listar containers + eventos + versão); todo o resto,
  # incluindo qualquer POST, é negado. Uma RCE no Traefik deixa de significar
  # acesso root ao host via API do Docker.
  # ---------------------------------------------------------------------------
  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: traefik_socket_proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - CONTAINERS=1   # GET /containers — único acréscimo aos defaults (events/ping/version)
      - POST=0         # explícito: nenhuma operação de escrita
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  traefik:
    image: traefik:v3.6
    container_name: traefik_proxy
    restart: unless-stopped
    depends_on:
      - socket-proxy
    security_opt:
      - no-new-privileges:true

    # -------------------------------------------------------------------------
    # CLI - Configuração principal do Traefik
    # -------------------------------------------------------------------------
    command:
      # --- API & Dashboard ---
      - "--api.dashboard=true"
      - "--api.insecure=false"               # dashboard só via roteador (HTTPS)

      # --- Providers ---
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"   # via socket-proxy, nunca o socket direto
      - "--providers.docker.watch=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy-network"
      - "--providers.file.directory=/config"
      - "--providers.file.watch=true"

      # --- Entrypoints ---
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"

      # Redireciona todo HTTP → HTTPS automaticamente
      - "--entryPoints.web.http.redirections.entrypoint.to=websecure"
      - "--entryPoints.web.http.redirections.entrypoint.scheme=https"
      - "--entryPoints.web.http.redirections.entrypoint.permanent=true"

      # --- TLS / Let's Encrypt (ACME) ---
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # CA server controlado por variável de ambiente: o default é SEMPRE a CA
      # de produção — esquecer a variável nunca quebra prod. Para testes, defina
      # ACME_CASERVER no .env apontando para o staging (veja .env.example).
      - "--certificatesresolvers.letsencrypt.acme.caserver=${ACME_CASERVER:-https://acme-v02.api.letsencrypt.org/directory}"

      # --- Segurança global TLS ---
      - "--entryPoints.websecure.http.tls=true"
      - "--entryPoints.websecure.http.tls.certresolver=letsencrypt"

      # --- Logs ---
      - "--log.level=INFO"                   # DEBUG | INFO | WARN | ERROR
      - "--log.format=json"
      - "--accesslog=true"
      - "--accesslog.format=json"

      # --- Telemetria desligada ---
      - "--global.sendAnonymousUsage=false"
      - "--global.checkNewVersion=false"

      # --- Health check interno ---
      - "--ping=true"
      - "--entryPoints.ping.address=:8082"
      - "--ping.entrypoint=ping"

    # -------------------------------------------------------------------------
    # Labels - Roteamento do próprio dashboard
    # -------------------------------------------------------------------------
    labels:
      - "traefik.enable=true"

      # Roteador HTTPS para o dashboard
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"

      # Middleware de autenticação básica (usuário/senha via arquivo)
      - "traefik.http.middlewares.dashboard-auth.basicauth.usersfile=/auth/dashboard_users"
      - "traefik.http.middlewares.dashboard-auth.basicauth.realm=Traefik Dashboard"

      # Middleware de segurança de headers — usado pelo dashboard e disponível como
      # referência de configuração. Outros serviços na rede devem definir seu próprio
      # middleware com nome único (ex: "meu-servico-security-headers") nos próprios
      # labels, copiando estas mesmas diretivas. Não reutilize "dashboard-security-headers"
      # de fora deste projeto: middlewares definidos via Docker labels são resolvidos
      # por nome global no provider, e compartilhar o mesmo nome entre containers de
      # projetos distintos causa conflito se a ordem de inicialização não for garantida.
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth@docker,dashboard-security-headers@docker,dashboard-ratelimit@docker"
      - "traefik.http.middlewares.dashboard-security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.dashboard-security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.dashboard-security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.dashboard-security-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.dashboard-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.dashboard-security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.dashboard-security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.dashboard-security-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()"

      # Middleware de rate limit (proteção brute force no dashboard)
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.burst=20"

    # -------------------------------------------------------------------------
    # Portas expostas
    # -------------------------------------------------------------------------
    ports:
      - "0.0.0.0:80:80"       # IPv4 HTTP  (redireciona para HTTPS)
      - "[::]:80:80"           # IPv6 HTTP  (redireciona para HTTPS)
      - "0.0.0.0:443:443"      # IPv4 HTTPS
      - "[::]:443:443"         # IPv6 HTTPS
      # Porta 8080 REMOVIDA em produção — dashboard acessível apenas via HTTPS

    # -------------------------------------------------------------------------
    # Volumes
    # -------------------------------------------------------------------------
    volumes:
      - ./traefik/acme:/acme                           # certificados Let's Encrypt
      - ./traefik/auth:/auth:ro                        # arquivo de usuários do dashboard
      - ./traefik/config:/config:ro                    # configs dinâmicas (file provider)

    networks:
      - proxy-network
      - socket-proxy-net

    # -------------------------------------------------------------------------
    # Rotação de logs — access log JSON cresce rápido; sem limite, enche o
    # disco da VPS com o tempo (máx. ~50 MB por container com estes valores)
    # -------------------------------------------------------------------------
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # -------------------------------------------------------------------------
    # Health check
    # -------------------------------------------------------------------------
    healthcheck:
      # Binário nativo do Traefik — não depende de wget/curl da imagem base.
      # Os flags de entrypoint são repetidos porque o subcomando healthcheck
      # não herda a config do processo principal (sem eles, procuraria o ping
      # na porta default 8080, que não existe aqui).
      test: ["CMD", "traefik", "healthcheck", "--ping", "--entrypoints.ping.address=:8082", "--ping.entrypoint=ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# =============================================================================
# Redes
#   proxy-network    → externa, compartilhada com os outros serviços
#                      Criar com: docker network create proxy-network
#   socket-proxy-net → interna (sem saída), só Traefik ↔ socket-proxy
# =============================================================================
networks:
  proxy-network:
    external: true
  socket-proxy-net:
    internal: true
