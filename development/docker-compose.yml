# =============================================================================
# Traefik v3 - Configuração de DESENVOLVIMENTO LOCAL
# =============================================================================
# HTTP + HTTPS (certificado local via mkcert), sem autenticação, sem rate
# limit — otimizado para dev local.
#
# Pré-requisito:
#   bash setup-traefik-dev.sh   (cria a rede proxy-network e o certificado TLS)
#
# Dashboard acessível de duas formas:
#   - http(s)://localhost:8080/dashboard/  (sempre disponível, sem /etc/hosts)
#   - http(s)://traefik.local/dashboard/   (requer entrada no /etc/hosts:
#                                            127.0.0.1 traefik.local)
# =============================================================================

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik_dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    # -------------------------------------------------------------------------
    # CLI - Configuração do Traefik para desenvolvimento
    # -------------------------------------------------------------------------
    command:
      # --- API & Dashboard ---
      - "--api.dashboard=true"
      - "--api.insecure=true"               # expõe a API diretamente na porta 8080

      # --- Providers ---
      - "--providers.docker=true"
      - "--providers.docker.watch=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy-network"
      - "--providers.file.directory=/etc/traefik/dynamic"  # certificado TLS local (mkcert)
      - "--providers.file.watch=true"

      # --- Entrypoints ---
      - "--entryPoints.web.address=:80"          # HTTP
      - "--entryPoints.websecure.address=:443"   # HTTPS (certificado local via mkcert)

      # --- Logs ---
      - "--log.level=DEBUG"                # DEBUG | INFO | WARN | ERROR
      - "--accesslog=true"

    # -------------------------------------------------------------------------
    # Labels - Dashboard acessível via traefik.local (portas 80 e 443)
    # Requer no /etc/hosts: 127.0.0.1 traefik.local
    # -------------------------------------------------------------------------
    labels:
      # Nomes sufixados com "-dev": routers/middlewares do provider docker são
      # resolvidos por nome global — se este container e o de produção fossem
      # vistos pelo mesmo daemon, um router "dashboard" duplicado geraria
      # conflito. O sufixo elimina a colisão.
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard-dev.rule=Host(`traefik.local`)"
      - "traefik.http.routers.dashboard-dev.service=api@internal"
      - "traefik.http.routers.dashboard-dev.entrypoints=web"
      - "traefik.http.routers.dashboard-dev.middlewares=redirect-to-dashboard-dev@docker"

      - "traefik.http.routers.dashboard-dev-secure.rule=Host(`traefik.local`)"
      - "traefik.http.routers.dashboard-dev-secure.service=api@internal"
      - "traefik.http.routers.dashboard-dev-secure.entrypoints=websecure"
      - "traefik.http.routers.dashboard-dev-secure.tls=true"
      - "traefik.http.routers.dashboard-dev-secure.middlewares=redirect-to-dashboard-dev@docker"

      # Regex com grupo de captura do esquema (http/https) — mesmo middleware
      # serve os dois routers acima. "$" precisa ser escapado como "$$" para o
      # docker compose não tentar interpolar a referência como variável.
      - "traefik.http.middlewares.redirect-to-dashboard-dev.redirectregex.regex=^(https?)://traefik\\.local/?$$"
      - "traefik.http.middlewares.redirect-to-dashboard-dev.redirectregex.replacement=$$1://traefik.local/dashboard/"

    # -------------------------------------------------------------------------
    # Portas expostas
    # -------------------------------------------------------------------------
    # Bind apenas em loopback: o dashboard roda sem autenticação
    # (api.insecure=true) e não deve ficar acessível a outras máquinas da
    # rede local. localhost, *.localhost e traefik.local seguem funcionando.
    ports:
      - "127.0.0.1:80:80"       # HTTP — tráfego de entrada dos serviços
      - "127.0.0.1:443:443"     # HTTPS — certificado local (mkcert)
      - "127.0.0.1:8080:8080"   # Dashboard direto (api.insecure=true)

    # -------------------------------------------------------------------------
    # Volumes
    # -------------------------------------------------------------------------
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/certs:/etc/traefik/certs:ro       # certificado TLS gerado pelo mkcert
      - ./traefik/dynamic:/etc/traefik/dynamic:ro   # config dinâmica (aponta pro certificado)

    networks:
      - proxy-network

# =============================================================================
# Rede externa compartilhada com os outros serviços
# Criar com: docker network create proxy-network
# =============================================================================
networks:
  proxy-network:
    external: true
